{% extends "base.html" %}

{% block title %}Редактировать группу{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card">
            <h1>Редактирование группы</h1>

            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="name">Название группы</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        value="{{ group.name }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="course">Курс</label>
                    <input
                        type="number"
                        id="course"
                        name="course"
                        value="{{ group.course }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="description">Описание</label>
                    <input
                        type="text"
                        id="description"
                        name="description"
                        value="{{ group.description or '' }}"
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Сохранить изменения
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
