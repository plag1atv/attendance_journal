{% extends "base.html" %}

{% block title %}Редактировать студента{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card">
            <h1>Редактирование студента</h1>

            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="full_name">ФИО студента</label>
                    <input
                        type="text"
                        id="full_name"
                        name="full_name"
                        value="{{ student.full_name }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Почта</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        value="{{ student.email or '' }}"
                    >
                </div>

                <div class="form-group">
                    <label for="phone">Телефон</label>
                    <input
                        type="text"
                        id="phone"
                        name="phone"
                        value="{{ student.phone or '' }}"
                    >
                </div>

                <div class="form-group">
                    <label for="group_id">Группа</label>
                    <select id="group_id" name="group_id" required>
                        {% for group in groups %}
                            <option
                                value="{{ group.id }}"
                                {% if group.id == student.group_id %}selected{% endif %}
                            >
                                {{ group.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Сохранить изменения
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
